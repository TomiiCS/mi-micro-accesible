<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Micro Accesible</title>
    <link rel="stylesheet" href="/leaflet/leaflet.css">
    <link rel="stylesheet" href="./css/stylesheet.css">
</head>

<body>  
    <header>
        <section class="titulo">
            <img src="./assets/bus-solid.png" height="50px" width="50px">
            <h1>Mi Micro Accesible</h1> 
            <p>Interfaz accesible para transporte público</p>
        </section>
        <section class="accesibilidad">
            <div class="controles-texto"> 
                <button>A-</button><button>A</button><button>A+</button>
            </div>
            <div class="control-contraste"> 
                <button id="boton-contraste"><img src="./assets/circle-half-stroke-solid.png" height="15px" width="15px"></button><span> Alto contraste</span>
            </div>
            <button id="boton-volumen-header"><img src="./assets/volume-solid.png" height="15px" width="15px">Escuchar página</button>
        </section>
    </header>

    <main>
        <nav class="buscador">
             <div class="panel-header"><h2>Consultar recorrido</h2></div>
             <div class="panel-body">
                <div class="campo">
                    <label for="origen">Origen</label>
                    <select id="origen" ></select>
                </div>
                <div class="campo">
                    <label for="destino">Destino</label>
                    <select id="destino" ></select>
                </div>
                <button id="buscar"><img src="./assets/magnifying-glass-solid.png" height="20px" width="20px">Buscar recorrido</button>
             </div>
        </nav>
        <section class="recorrido">
            <section class="mapa">
                <div class="panel-header"><h2>Mapa</h2></div>
                <div id="mapa"></div>
            </section>
            <section class="indicaciones">
                <div class="panel-header"><h2>Indicaciones</h2>
                    <button id="escuchar-recorrido"><img src="./assets/volume-solid.png" height="15px" width="15px">Escuchar Recorrido</button>
                </div>
                <div class="lista-indicaciones">
                    <ol id="lista"></ol>
                </div>
            </section>
        </section>
    </main>

    <footer>
        <p>
            Seminario de Lenguajes - JavaScript 
        </p>
    </footer>

    <script src="/leaflet/leaflet.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
