<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Micro Accesible</title>
    <link rel="stylesheet" href="/leaflet/leaflet.css">
    <link rel="stylesheet" href="./css/stylesheet.css">
</head>

<body>  
    <header>
        <section class="titulo">
            <h1>Mi Micro Accesible</h1> 
            <p>Interfaz accesible para transporte público</p>
        </section>
        <section class="accesibilidad">
            <div class="controles-texto"> <button>A-</button><button>A</button><button>A+</button></div>
            <div class="control-contraste"> <button></button><span> Alto contraste</span></div>
            <button>Escuchar página</button>
        </section>
    </header>
    <main>
        <nav class="buscador">
            <h2>Consultar recorrido</h2>
            <div class="campo"></div>
                <label for="origen">Origen</label>
                <select id="origen"></select>
            </div>
            <div class="campo">
                <label for="destino">Destino</label>
                <select id="destino"></select>
            </div>
            <button id="buscar">Buscar recorrido</button>
        </nav>
        <section class="recorrido">
            <section class="mapa">
                <h2>Mapa</h2>
                <div id="mapa"></div>
            </section>
            <section class="indicaciones">
                <div class="encabezado-indicaciones">
                    <h2>Indicaciones</h2>
                    <button id="escucharRecorrido">Escuchar Recorrido</button>
                </div>
            </section>
        </section>
    </main>

    <footer>
        <p>
            Seminario de Lenguajes - JavaScript 
        </p>
    </footer>

    <script src="/leaflet/leaflet.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
